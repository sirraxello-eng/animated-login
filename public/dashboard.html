<!DOCTYPE html>
<html>
<head>
  <title>Premium Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    /* SIDEBAR */
    .sidebar {
      width: 230px;
      height: 100vh;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      padding: 20px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
      font-size: 22px;
      font-weight: bold;
      color: #00f2fe;
      text-shadow: 0 0 10px #00f2fe;
    }

    .menu li {
      list-style: none;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .menu li:hover {
      background: rgba(0,242,254,0.15);
      box-shadow: 0 0 10px #00f2fe;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .welcome {
      font-size: 18px;
      text-shadow: 0 0 10px #00f2fe;
    }

    .logout {
      border: 1px solid #00f2fe;
      background: transparent;
      color: #00f2fe;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
    }

    .logout:hover {
      background: #00f2fe;
      color: black;
    }

    /* CARDS */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 180px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      box-shadow: 0 0 15px rgba(0,242,254,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px #00f2fe;
    }

    /* TABLE */
    .table-container {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(15px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      border-bottom: 1px solid #00f2fe;
    }

    tr:hover {
      background: rgba(0,242,254,0.1);
    }

    input {
      background: transparent;
      border: 1px solid #444;
      color: white;
      padding: 5px;
      border-radius: 5px;
    }

    button.action {
      padding: 5px 10px;
      margin: 2px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .update { background: #00f2fe; color: black; }
    .delete { background: red; color: white; }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">⚡ MyApp</div>
  <ul class="menu">
    <li>🏠 Dashboard</li>
    <li>👥 Users</li>
    <li>📊 Analytics</li>
    <li>⚙️ Settings</li>
  </ul>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <div class="welcome" id="welcome"></div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card">👥 Total Users</div>
    <div class="card">📊 Traffic</div>
    <div class="card">💰 Revenue</div>
    <div class="card">⚙️ System</div>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <h3>Manajemen User</h3>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nama</th>
          <th>Email</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>

</div>

<script>
const name = localStorage.getItem("name");
if (!localStorage.getItem("token")) {
  window.location.href = "/";
}

document.getElementById("welcome").innerText =
  "Welcome, " + name;

function logout() {
  localStorage.clear();
  window.location.href = "/";
}
</script>

<script src="script.js"></script>

</body>
</html>
